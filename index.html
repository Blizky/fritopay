<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>Frito Pay</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="game">
    <div class="topbar">
      <div class="title-row">
        <div class="title round-title" id="roundLabel">Round 1</div>
        <div class="title-meta">
          <div class="score-display hidden" id="scoreLabel">Score: 0</div>
        </div>
      </div>

      <div class="timer-labels">
        <div id="timerLabel">Time: 6.0s</div>
        <div id="targetLabel">Find all the cats</div>
      </div>

      <div class="progress-shell">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
      <img class="mole-runner" id="moleRunner" src="images/mole.png" alt="" />
      <img class="trap-runner" id="trapRunner" src="images/trap.png" alt="" />
      <div class="timeout-flash" id="timeoutFlash">Time's up</div>
      <div class="trap-outcome-splash" id="trapOutcomeSplash"></div>

      <div class="overlay-panel home-screen show" id="landingPanel">
        <div class="home-screen-card home-screen-card-landing">
          <button class="cta-btn cta-btn-start" id="playBtn">Start playing</button>
          <div class="simulated-start-list" id="simulatedStartList"></div>
          <button class="cache-reset-btn" id="clearCacheBtn" type="button">Clear cache</button>
        </div>
        <div class="landing-language-toggle" id="landingLanguageToggle" aria-label="Language toggle">
          <button class="language-toggle-btn active" type="button" data-lang="en">Eng</button>
          <button class="language-toggle-btn" type="button" data-lang="es">Spa</button>
        </div>
      </div>

      <div class="overlay-panel home-screen" id="splashPanel">
        <div class="home-screen-card intro-screen-card">
          <div class="overlay-text" id="splashText">
            Frito scattered the cats. Rescue them before time runs out.
          </div>
          <div class="intro-screen-note" id="introTimeNote">You have 8 seconds to find all the cats.</div>
          <button class="cta-btn cta-btn-start" id="startBtn">Start rescuing cats</button>
        </div>
      </div>

      <div class="overlay-panel" id="resultPanel">
        <div class="overlay-title" id="resultTitle">Round Over</div>
        <div class="overlay-text" id="resultText"></div>
        <div class="hairball-summary" id="resourceSummary">
          <div class="result-time-title" id="timeSummaryText">Time for next round</div>
          <div class="result-time-bar" id="resultTimeBar" aria-hidden="true">
            <div class="result-time-bar-track">
              <div class="result-time-bar-loss" id="resultTimeBarLoss"></div>
              <div class="result-time-bar-fill" id="resultTimeBarFill"></div>
              <div class="result-time-bar-gain" id="resultTimeBarGain"></div>
              <div class="result-time-bar-value" id="resultTimeBarValue">0 + 0 = 0</div>
            </div>
          </div>
        </div>
        <div class="result-breakdown hidden" id="resultBreakdown"></div>
        <div class="trap-offer-overlay hidden" id="trapOfferOverlay">
          <div class="trap-offer hidden" id="trapOffer">
            <button class="trap-offer-close" id="trapOfferCloseBtn" type="button" aria-label="Close offer">×</button>
            <div class="trap-offer-title">Special Offer</div>
            <img class="trap-offer-seller" id="trapOfferSeller" src="images/racoon.png" alt="" />
            <div class="trap-offer-message hidden" id="trapOfferMessage"></div>
            <div class="trap-offer-note hidden" id="trapOfferNote"></div>
            <div class="trap-offer-summary hidden" id="trapOfferSummary">
              <div class="trap-offer-summary-visual" id="trapOfferSummaryVisual">
                <span class="offer-heart offer-heart-one" aria-hidden="true">❤</span>
                <span class="offer-heart offer-heart-two" aria-hidden="true">❤</span>
                <span class="offer-heart offer-heart-three" aria-hidden="true">❤</span>
                <span class="offer-heart offer-heart-four" aria-hidden="true">❤</span>
                <div class="trap-offer-summary-item" id="trapOfferSummaryItem">
                  <img class="trap-offer-summary-image" id="trapOfferSummaryImage" src="images/trap.png" alt="" />
                </div>
              </div>
              <div class="trap-offer-summary-text" id="trapOfferSummaryText">Trap: 1</div>
            </div>
            <div class="trap-offer-rows" id="trapOfferRows"></div>
            <button class="cta-btn trap-offer-dismiss hidden" id="trapOfferDismissBtn">Oh ok</button>
          </div>
        </div>
        <button class="cta-btn" id="nextBtn">Next Round</button>
        <button class="cta-btn cta-btn-exit hidden" id="exitBtn">Exit</button>
        <div class="small-note" id="timeNote"></div>
      </div>
    </div>

    <div class="bottombar">
      <div class="stats">
        <button class="bottom-exit-btn hidden" id="bottomExitBtn" type="button">Exit</button>
      </div>
      <div class="bottom-hairball-display" id="bottomHairballDisplay" aria-hidden="true">
        <img class="bottom-hairball-image" src="images/hairball.png" alt="" />
        <span class="bottom-hairball-count" id="bottomHairballCount">0</span>
      </div>
      <button class="mute-toggle hidden" id="muteToggle" type="button" aria-label="Mute">
        🔈
      </button>
      <div class="language-toggle" id="languageToggle" aria-label="Language toggle">
        <button class="language-toggle-btn active" type="button" data-lang="en">Eng</button>
        <button class="language-toggle-btn" type="button" data-lang="es">Spa</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
